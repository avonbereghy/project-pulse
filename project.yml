name: ProjectPulse
options:
  bundleIdPrefix: com.avb
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: Y8T448S9AH
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES

targets:
  ProjectPulse:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "*.entitlements"
          - Info.plist
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ProjectPulse
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "4"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avb.projectpulse
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ProjectPulseWidgetExtension
    postCompileScripts: []

  ProjectPulseWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
        excludes:
          - "*.entitlements"
          - Info.plist
      - path: Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: ProjectPulse Widget
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "4"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avb.projectpulse.widget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
